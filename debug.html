<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>ProcDetails — Debug Pipeline</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 1.5rem; }
  h2 { color: #0E7C66; }
  .step { margin: .5rem 0; padding: .4rem .7rem; border-radius: 4px; }
  .ok   { background: #1a3a1a; color: #6ddf6d; }
  .err  { background: #3a1a1a; color: #ff6b6b; }
  .info { background: #1a2a3a; color: #7ac; }
  .warn { background: #3a3a1a; color: #ffd; }
  input { background:#222; color:#eee; border:1px solid #444; padding:.4rem .6rem; border-radius:4px; width:280px; }
  button { background:#0E7C66; color:#fff; border:none; padding:.5rem 1.2rem; border-radius:4px; cursor:pointer; margin-left:.5rem; }
  #log { margin-top:1rem; max-height:80vh; overflow-y:auto; }
</style>
</head>
<body>
<h2>ProcDetails — Debug Decryption Pipeline</h2>
<div>
  <label>Senha: <input type="password" id="pw" placeholder="senha da base"/></label>
  <button onclick="runDebug()">Testar</button>
</div>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
const log = document.getElementById('log');
function step(cls, msg) {
  const d = document.createElement('div');
  d.className = 'step ' + cls;
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  console.log('[debug]', msg);
}

async function runDebug() {
  log.innerHTML = '';
  const pw = document.getElementById('pw').value;
  if (!pw) { step('err', 'Digite a senha primeiro.'); return; }

  const ENC_URL = './base_processos.enc';
  const SQLJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/';

  // ── Passo 1: sql.js ─────────────────────────────────────────────────
  step('info', '[1] Inicializando sql.js…');
  let SQL;
  try {
    const t0 = performance.now();
    SQL = await initSqlJs({ locateFile: f => SQLJS_CDN + f });
    step('ok', `[1] sql.js OK (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[1] FALHA sql.js: ' + e.message); return;
  }

  // ── Passo 2: fetch ────────────────────────────────────────────────────
  step('info', '[2] Buscando ' + ENC_URL + '…');
  let encBuf;
  try {
    const t0 = performance.now();
    const res = await fetch(ENC_URL);
    step('info', `[2] HTTP ${res.status}, Content-Length=${res.headers.get('Content-Length')}`);
    encBuf = await res.arrayBuffer();
    step('ok', `[2] Fetch OK — ${encBuf.byteLength.toLocaleString()} bytes (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[2] FALHA fetch: ' + e.message); return;
  }

  // ── Passo 3: verificar cabeçalho PJDB ────────────────────────────────
  const encBytes = new Uint8Array(encBuf);
  const magic = String.fromCharCode(encBytes[0], encBytes[1], encBytes[2], encBytes[3]);
  const version = encBytes[4];
  step(magic === 'PJDB' ? 'ok' : 'err', `[3] Magic="${magic}" (esperado: PJDB)`);
  step(version === 0x01  ? 'ok' : 'err', `[3] Version=0x${version.toString(16).padStart(2,'0')} (esperado: 0x01)`);
  step('info', `[3] Salt   = ${Array.from(encBytes.slice(5,21)).map(x=>x.toString(16).padStart(2,'0')).join('')}`);
  step('info', `[3] Nonce  = ${Array.from(encBytes.slice(21,33)).map(x=>x.toString(16).padStart(2,'0')).join('')}`);
  step('info', `[3] Ciphertext = ${(encBytes.length-33).toLocaleString()} bytes`);
  if (magic !== 'PJDB' || version !== 0x01) { step('err', '[3] Arquivo inválido — abortando.'); return; }

  // ── Passo 4: PBKDF2 ──────────────────────────────────────────────────
  step('info', '[4] Derivando chave (PBKDF2-HMAC-SHA256, 100k iter)…');
  let chave;
  try {
    const t0 = performance.now();
    const salt = encBytes.slice(5, 21);
    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw),
      { name: 'PBKDF2' }, false, ['deriveKey']
    );
    chave = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100_000, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    step('ok', `[4] PBKDF2 OK (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[4] FALHA PBKDF2: ' + e.message); return;
  }

  // ── Passo 5: AES-GCM decrypt ─────────────────────────────────────────
  step('info', '[5] Decifrando AES-256-GCM…');
  let compressed;
  try {
    const t0 = performance.now();
    const nonce = encBytes.slice(21, 33);
    const ct    = encBytes.slice(33);
    const dec   = await crypto.subtle.decrypt({ name:'AES-GCM', iv:nonce }, chave, ct);
    compressed  = new Uint8Array(dec);
    step('ok', `[5] AES-GCM OK — ${compressed.length.toLocaleString()} bytes gzip (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[5] FALHA AES-GCM: ' + e.message + ' (senha errada?)'); return;
  }

  // ── Passo 6: DecompressionStream ────────────────────────────────────
  step('info', '[6] DecompressionStream disponível: ' + (typeof DecompressionStream !== 'undefined'));
  let sqliteBytes;
  try {
    const t0 = performance.now();
    const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));
    sqliteBytes  = new Uint8Array(await new Response(stream).arrayBuffer());
    step('ok', `[6] Gzip OK — ${sqliteBytes.length.toLocaleString()} bytes SQLite (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[6] FALHA gzip: ' + e.message); return;
  }

  // ── Passo 7: sql.js abrir banco ──────────────────────────────────────
  step('info', '[7] Abrindo banco SQLite com sql.js…');
  let db;
  try {
    const t0 = performance.now();
    db = new SQL.Database(sqliteBytes);
    const r = db.exec('SELECT COUNT(*) FROM processos');
    const n = r[0].values[0][0];
    step('ok', `[7] Banco OK — ${n} processos (${(performance.now()-t0).toFixed(0)} ms)`);
  } catch(e) {
    step('err', '[7] FALHA sql.js: ' + e.message); return;
  }

  // ── Passo 8: verificar tabelas FTS5 ──────────────────────────────────
  step('info', '[8] Verificando tabelas FTS5…');
  const ftsTables = ['processos_fts', 'comunicacoes_fts', 'movimentos_fts'];
  for (const tbl of ftsTables) {
    try {
      const r = db.exec(`SELECT COUNT(*) FROM ${tbl}`);
      const n = r[0].values[0][0];
      step(n > 0 ? 'ok' : 'warn', `[8] ${tbl}: ${n} linha${n !== 1 ? 's' : ''} indexadas`);
    } catch(e) {
      step('err', `[8] ${tbl}: FALHA — ${e.message}`);
    }
  }
  try {
    const r = db.exec(`SELECT COUNT(*) FROM comunicacoes_fts WHERE comunicacoes_fts MATCH '"guarda"*'`);
    const n = r[0].values[0][0];
    step('info', `[8] FTS teste '"guarda"*' em comunicacoes_fts: ${n} hit(s)`);
  } catch(e) { step('warn', '[8] Teste FTS comunicacoes: ' + e.message); }
  try {
    const r = db.exec(`SELECT COUNT(*) FROM movimentos_fts WHERE movimentos_fts MATCH '"guarda"*'`);
    const n = r[0].values[0][0];
    step('info', `[8] FTS teste '"guarda"*' em movimentos_fts: ${n} hit(s)`);
  } catch(e) { step('warn', '[8] Teste FTS movimentos: ' + e.message); }

  step('ok', '✅ Pipeline completo! O app deve funcionar.');
}
</script>
</body>
</html>
